# Requested: /chat subpath deployment
server {
    listen 80;
    server_name example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    client_max_body_size 50M;

    # Element UI under /chat/ui/
    location /chat/ui/ {
        proxy_pass http://element:80/;
        include /etc/nginx/snippets/proxy-matrix-headers.conf;
    }

    # Matrix Client-Server API at /chat/_matrix -> /_matrix
    location ^~ /chat/_matrix/ {
        rewrite ^/chat/_matrix/(.*)$ /_matrix/$1 break;
        proxy_pass http://synapse:8008;
        include /etc/nginx/snippets/proxy-matrix-headers.conf;
    }

    # Synapse legacy client path at /chat/_synapse/client -> /_synapse/client
    location ^~ /chat/_synapse/client/ {
        rewrite ^/chat/_synapse/client/(.*)$ /_synapse/client/$1 break;
        proxy_pass http://synapse:8008;
        include /etc/nginx/snippets/proxy-matrix-headers.conf;
    }

    # Optional: convenience redirect for /chat root.
    location = /chat {
        return 301 /chat/ui/;
    }

    # Small health endpoint
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
