# Synapse configuration template for a zero-read (E2EE) relay deployment.
# Copy and customize. Keep secrets in environment variables or Docker secrets.

server_name: "example.com"
pid_file: /data/homeserver.pid
public_baseurl: "https://example.com/chat/"

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

log_config: "/data/example.com.log.config"
media_store_path: /data/media_store
registration_shared_secret: "CHANGE_ME_REGISTRATION_SECRET"
macaroon_secret_key: "CHANGE_ME_MACAROON_SECRET"
form_secret: "CHANGE_ME_FORM_SECRET"
signing_key_path: "/data/example.com.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

# Disable open registration by default.
enable_registration: false
enable_registration_without_verification: false

# Synapse hardening / abuse controls.
limit_remote_rooms:
  enabled: true
  complexity: 1.0
  complexity_error: "Room too complex"

rc_message:
  per_second: 0.2
  burst_count: 10

rc_registration:
  per_second: 0.1
  burst_count: 3

rc_login:
  address:
    per_second: 0.003
    burst_count: 5
  account:
    per_second: 0.003
    burst_count: 5
  failed_attempts:
    per_second: 0.003
    burst_count: 5

federation_rc_concurrent:
  window_size: 1000
  sleep_limit: 10
  sleep_delay: 500
  reject_limit: 50
  concurrent: 3

# Database: PostgreSQL
# Generate secure DB credentials in chat/.env and keep .env out of git.
database:
  name: psycopg2
  args:
    user: "synapse"
    password: "${POSTGRES_PASSWORD}"
    database: "synapse"
    host: "postgres"
    cp_min: 5
    cp_max: 10

# Keep URL previews disabled unless explicitly needed (privacy + SSRF risk reduction).
url_preview_enabled: false

# Optional TURN placeholders (for VoIP support)
#turn_uris: ["turn:turn.example.com?transport=udp", "turn:turn.example.com?transport=tcp"]
#turn_shared_secret: "CHANGE_ME"
#turn_user_lifetime: 1h
#turn_allow_guests: false

# Notes:
# 1) To initially generate config in /data:
#    docker run --rm -it -v ./chat/synapse/data:/data \
#      -e SYNAPSE_SERVER_NAME=example.com \
#      -e SYNAPSE_REPORT_STATS=no matrixdotorg/synapse:latest generate
# 2) After first boot, use register_new_matrix_user inside container for local users:
#    docker exec -it chat-synapse register_new_matrix_user \
#      -c /data/homeserver.yaml http://localhost:8008
